<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Méqui Treinamento - Fluxo Oficial</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fcfcfc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95vh; }
        .container { max-width: 800px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); overflow: hidden; display: flex; flex-direction: column; min-height: 650px; border: 1px solid #f2f2f2; }
        
        /* Controle das Telas */
        .tela { display: none; padding: 40px; flex-direction: column; flex: 1; }
        .tela.ativa { display: flex; }
        
        .btn-voltar { background: none; border: none; font-size: 14px; color: #7d7d7d; cursor: pointer; font-weight: bold; margin-bottom: 20px; text-align: left; width: fit-content; display: flex; align-items: center; gap: 5px; }
        .btn-voltar:hover { color: #292929; }

        /* TELA 1: APRESENTAÇÃO */
        .centro-apresentacao { text-align: center; margin: auto; max-width: 400px; }
        .logo-m { width: 80px; height: 80px; background: #ffbc0d; border-radius: 18px; margin: 0 auto 25px auto; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; color: #c8102e; }
        .btn-amarelo { width: 100%; padding: 18px; background: #ffbc0d; border: none; font-size: 16px; color: #292929; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(255, 188, 13, 0.2); }
        .btn-amarelo:hover { background: #f5b100; }

        /* TELA 2: CATEGORIAS PRINCIPAIS (image_3c0a86.png) */
        .titulo-secao { font-size: 24px; color: #292929; font-weight: bold; margin: 0 0 30px 0; }
        .grid-categorias { display: flex; justify-content: center; gap: 40px; margin: auto 0; }
        .card-categoria { display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; background: none; transition: transform 0.2s; width: 160px; }
        .card-categoria:hover { transform: scale(1.05); }
        .card-categoria img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 15px; }
        .card-categoria span { font-size: 16px; color: #292929; font-weight: bold; text-align: center; line-height: 1.3; }

        /* TELA 3: GRID DE SANDUÍCHES (image_3c06e5.png) */
        .grid-lanches { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; overflow-y: auto; }
        .card-lanche { background: #f8f8f8; border-radius: 12px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; min-height: 160px; }
        .card-lanche:hover { background: white; border-color: #ffbc0d; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-lanche img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .card-lanche span { font-size: 12px; color: #292929; font-weight: bold; line-height: 1.3; }

        /* TELA 4: DETALHE / FICHA DA RECEITA (image_3bfee7.png) */
        .receita-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-bottom: 30px; }
        .receita-esquerda { text-align: left; }
        .receita-esquerda h2 { font-size: 32px; color: #292929; margin: 0 0 20px 0; font-weight: bold; }
        .receita-esquerda img { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; display: block; }
        .receita-esquerda p { font-size: 14px; color: #666; line-height: 1.6; margin: 0; }
        
        .receita-direita { border-left: 1px solid #f2f2f2; padding-left: 30px; display: flex; flex-direction: column; gap: 12px; }
        .ingrediente-linha { display: flex; align-items: center; gap: 15px; padding: 8px 0; border-bottom: 1px solid #fafafa; }
        .ingrediente-linha img { width: 35px; height: 35px; object-fit: contain; }
        .ingrediente-linha span { font-size: 14px; color: #292929; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <div id="tela-apresentacao" class="tela ativa">
        <div class="centro-apresentacao">
            <div class="logo-m">M</div>
            <h1 style="font-size: 26px; margin-bottom: 10px;">Treinamento Operacional</h1>
            <p style="color: #7d7d7d; font-size: 15px; line-height: 1.5; margin-bottom: 30px;">Bem-vindo ao sistema de capacitação de montagem de lanches.</p>
            <button class="btn-amarelo" onclick="navegarPara('tela-categorias')">Iniciar Sistema</button>
        </div>
    </div>

    <div id="tela-categorias" class="tela">
        <button class="btn-voltar" onclick="navegarPara('tela-apresentacao')">◀ Sair</button>
        <h2 class="titulo-secao">Escolha uma Linha de Sanduíches</h2>
        <div class="grid-categorias">
            <button class="card-categoria" onclick="carregarGridLanches('bovina')">
                <img src="cat_bovina.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'60\' height=\'60\' viewBox=\'0 0 24 24\'><text x=\'2\' y=\'18\' font-size=\'16\'>🍔</text></svg>'" alt="Carne Bovina">
                <span>Sanduíches de Carne Bovina</span>
            </button>
            <button class="card-categoria" onclick="carregarGridLanches('tasty')">
                <img src="cat_tasty.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'60\' height=\'60\' viewBox=\'0 0 24 24\'><text x=\'2\' y=\'18\' font-size=\'16\'>👑</text></svg>'" alt="Família Tasty">
                <span>Família Tasty</span>
            </button>
            <button class="card-categoria" onclick="carregarGridLanches('frango')">
                <img src="cat_frango.png" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'60\' height=\'60\' viewBox=\'0 0 24 24\'><text x=\'2\' y=\'18\' font-size=\'16\'>🍗</text></svg>'" alt="Frango">
                <span>Sanduíches de Frango</span>
            </button>
        </div>
    </div>

    <div id="tela-grid-lanches" class="tela">
        <button class="btn-voltar" onclick="navegarPara('tela-categorias')">◀ Voltar para Categorias</button>
        <h2 class="titulo-secao" id="titulo-categoria-atual">Sanduíches</h2>
        <div class="grid-lanches" id="container-grid-lanches"></div>
    </div>

    <div id="tela-receita" class="tela">
        <button class="btn-voltar" onclick="navegarPara('tela-grid-lanches')">◀ Voltar para a Lista</button>
        
        <div class="receita-container">
            <div class="receita-esquerda">
                <h2 id="receita-nome">Nome do Lanche</h2>
                <img id="receita-imagem" src="" alt="Lanche">
                <p id="receita-descricao">Descrição oficial dos ingredientes.</p>
            </div>
            <div class="receita-direita" id="receita-lista-ingredientes"></div>
        </div>

        <button class="btn-amarelo" style="max-width: 250px; margin: 0 auto;" onclick="irParaCozinha()">Ir para Esteira de Produção ➔</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
